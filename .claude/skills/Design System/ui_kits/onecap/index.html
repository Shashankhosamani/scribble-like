<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OneCap — UI Kit</title>
  <link rel="icon" href="../../assets/favicon.svg" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; background: #FCFCFD; font-family: Inter, sans-serif; color: #12172B; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
    a { color: inherit; }
  </style>
  <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Login.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="Reconciliation.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function UploadModal({ onClose }) {
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(18,23,43,0.38)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, fontFamily: "Inter" }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ width: 460, background: "white", borderRadius: 14, boxShadow: "0 25px 50px -12px rgba(0,0,0,0.25)", padding: 24 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <Icon name="upload-cloud" size={20} color="#01187D" />
              <div style={{ font: "600 16px/22px Inter", color: "#12172B" }}>Upload ledger file</div>
              <div style={{ flex: 1 }} />
              <button onClick={onClose} style={{ border: 0, background: "transparent", cursor: "pointer" }}><Icon name="x" size={18} color="#6C727F" /></button>
            </div>
            <div style={{ border: "1.5px dashed #DDDFE4", borderRadius: 10, padding: 28, textAlign: "center", background: "#FCFCFD" }}>
              <Icon name="file-text" size={28} color="#99A1AF" />
              <div style={{ font: "500 14px/20px Inter", color: "#12172B", marginTop: 10 }}>Drop CSV, XLSX or OFX here</div>
              <div style={{ font: "400 12px/18px Inter", color: "#6C727F" }}>or click to browse — up to 200 MB</div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 18, justifyContent: "flex-end" }}>
              <Button variant="ghost" onClick={onClose}>Cancel</Button>
              <Button variant="primary" iconLeft="upload" onClick={onClose}>Start upload</Button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [authed, setAuthed] = useState(false);
      const [route, setRoute] = useState("dashboard");
      const [reconRow, setReconRow] = useState(null);
      const [uploadOpen, setUploadOpen] = useState(false);
      const [toast, setToast] = useState(null);

      useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

      if (!authed) return <Login onSignIn={() => setAuthed(true)} />;

      const content = reconRow
        ? <Reconciliation row={reconRow} onClose={() => setReconRow(null)} onResolve={() => { setReconRow(null); setToast("Resolution approved. Ledger synced."); setTimeout(() => setToast(null), 3200); }} />
        : route === "dashboard"
          ? <Dashboard onOpenRecon={(r) => setReconRow(r)} onUpload={() => setUploadOpen(true)} />
          : <PlaceholderPage name={route} />;

      return (
        <>
          <Shell current={reconRow ? "recon" : route} onNav={(r) => { setReconRow(null); setRoute(r); }} onUpload={() => setUploadOpen(true)}>
            {content}
          </Shell>
          {uploadOpen && <UploadModal onClose={() => setUploadOpen(false)} />}
          {toast && (
            <div style={{ position: "fixed", bottom: 24, right: 24, background: "#12172B", color: "white", padding: "12px 16px", borderRadius: 10, display: "flex", alignItems: "center", gap: 10, boxShadow: "0 10px 24px rgba(0,0,0,0.22)", font: "500 13px/18px Inter", zIndex: 60 }}>
              <Icon name="check-circle-2" size={16} color="#33E39E" />
              {toast}
            </div>
          )}
        </>
      );
    }

    function PlaceholderPage({ name }) {
      const titles = {
        vendors: "Vendors", invoices: "Invoices", reports: "Reports", compliance: "Compliance",
      };
      return (
        <div style={{ padding: 24, fontFamily: "Inter" }}>
          <div style={{ font: "700 24px/30px Inter", letterSpacing: "-0.4px", color: "#12172B" }}>{titles[name] || name}</div>
          <div style={{ font: "400 13px/20px Inter", color: "#6C727F", marginTop: 4, marginBottom: 20 }}>This surface is scaffolded. Open Dashboard to explore the interactive flow.</div>
          <Card>
            <div style={{ display: "flex", alignItems: "center", gap: 12, color: "#6C727F" }}>
              <Icon name="sparkles" size={18} color="#01187D" />
              <div style={{ font: "500 13px/20px Inter" }}>Sample content placeholder — maintained intentionally empty for this UI kit.</div>
            </div>
          </Card>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
