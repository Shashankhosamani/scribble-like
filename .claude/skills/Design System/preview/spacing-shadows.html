<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; padding: 4px; }
  .cell { background:white; border-radius:10px; height:80px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .xs { box-shadow: 0 1px 2px -1px rgba(0,0,0,0.08), 0 1px 3px 0 rgba(0,0,0,0.06); }
  .sm { box-shadow: 0 2px 4px 0 rgba(0,0,0,0.08), 0 4px 6px 0 rgba(0,0,0,0.06); }
  .md { box-shadow: 0 4px 12px -2px rgba(0,0,0,0.08), 0 8px 24px -4px rgba(0,0,0,0.08); }
  .lg { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.20); }
  .tok { font:600 12px/16px Inter; color:#12172B; }
  .val { font:400 11px/14px "JetBrains Mono"; color:#6C727F; margin-top:4px; }
</style></head><body><div class="card-root" style="background:#F3F4F6">
<div class="grid">
  <div class="cell xs"><div class="tok">xs</div><div class="val">resting</div></div>
  <div class="cell sm"><div class="tok">sm</div><div class="val">pop-over</div></div>
  <div class="cell md"><div class="tok">md</div><div class="val">menus, cards</div></div>
  <div class="cell lg"><div class="tok">lg</div><div class="val">modals</div></div>
</div>
</div></body></html>
