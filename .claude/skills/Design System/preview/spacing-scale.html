<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .row { display:flex; align-items:center; gap:14px; padding:8px 0; border-bottom:1px dashed #EDEFF3; }
  .row:last-child { border:0; }
  .tok { font:500 12px/16px "JetBrains Mono"; color:#57007F; width:80px; }
  .val { font:500 11px/16px "JetBrains Mono"; color:#6C727F; width:56px; }
  .bar { background:#01187D; height:12px; border-radius:3px; }
</style></head><body><div class="card-root">
  <div class="row"><span class="tok">sp-1</span><span class="val">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">sp-2</span><span class="val">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">sp-3</span><span class="val">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tok">sp-4</span><span class="val">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">sp-6</span><span class="val">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">sp-8</span><span class="val">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">sp-12</span><span class="val">48px</span><div class="bar" style="width:48px"></div></div>
</div></body></html>
