<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .section { margin-bottom: 14px; }
  .label { font: 600 13px/1.2 Inter; letter-spacing:-0.1px; margin-bottom: 4px; }
  .ramp { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; }
  .chip { height: 40px; border-radius: 5px; display:flex; align-items:flex-end; padding:4px; font: 500 9px/1 "JetBrains Mono", monospace; }
  .dark { color: white; } .light { color: #12172B; }
</style></head><body><div class="card-root">
  <div class="section">
    <div class="label">Midnight Violet</div>
    <div class="ramp">
      <div class="chip light" style="background:#F8EAFF">50</div>
      <div class="chip light" style="background:#EECCFE">100</div>
      <div class="chip light" style="background:#DE99FF">200</div>
      <div class="chip dark" style="background:#CB5BFF">300</div>
      <div class="chip dark" style="background:#B619FF">400</div>
      <div class="chip dark" style="background:#57007F">500</div>
      <div class="chip dark" style="background:#110019">600</div>
      <div class="chip dark" style="background:#1F002D">700</div>
      <div class="chip dark" style="background:#0A000F">800</div>
      <div class="chip dark" style="background:#050007">900</div>
    </div>
  </div>
  <div class="section">
    <div class="label">Sea Green</div>
    <div class="ramp">
      <div class="chip light" style="background:#EAFFF8">50</div>
      <div class="chip light" style="background:#CCFEEE">100</div>
      <div class="chip light" style="background:#99FFDD">200</div>
      <div class="chip dark" style="background:#5BFFC8">300</div>
      <div class="chip dark" style="background:#19FFB2">400</div>
      <div class="chip dark" style="background:#00A36C">500</div>
      <div class="chip dark" style="background:#003322">600</div>
      <div class="chip dark" style="background:#005136">700</div>
      <div class="chip dark" style="background:#00140D">800</div>
      <div class="chip dark" style="background:#000906">900</div>
    </div>
  </div>
</div></body></html>
