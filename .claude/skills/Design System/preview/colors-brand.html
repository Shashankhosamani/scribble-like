<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .swatch { border-radius: 10px; padding: 16px; color: white; height: 92px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 1px 2px rgba(0,0,0,0.06); position: relative; }
  .role { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.75; }
  .name { font-size: 13px; font-weight: 600; letter-spacing: -0.1px; }
  .hex { font-family: "JetBrains Mono", monospace; font-size: 11px; opacity: 0.82; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
</style></head><body><div class="card-root">
  <div class="grid">
    <div class="swatch" style="background:#01187D">
      <span class="role">Primary</span>
      <div><div class="name">Royal Blue</div><div class="hex">#01187D</div></div>
    </div>
    <div class="swatch" style="background:#6ABAED; color:#05253A">
      <span class="role" style="opacity:0.65">Secondary</span>
      <div><div class="name">Sea Green</div><div class="hex" style="opacity:0.7">#6ABAED</div></div>
    </div>
    <div class="swatch" style="background:#57007F">
      <span class="role">Accent · IDs</span>
      <div><div class="name">Midnight Violet</div><div class="hex">#57007F</div></div>
    </div>
  </div>
</div></body></html>
