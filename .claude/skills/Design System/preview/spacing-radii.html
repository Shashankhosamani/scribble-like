<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap:14px; }
  .cell { background:white; border:1px solid #EDEFF3; height:74px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .tok { font:500 11px/14px "JetBrains Mono"; color:#57007F; margin-bottom:4px; }
  .val { font:500 11px/14px "JetBrains Mono"; color:#6C727F; }
</style></head><body><div class="card-root">
<div class="grid">
  <div class="cell" style="border-radius:4px"><div class="tok">xs</div><div class="val">4px</div></div>
  <div class="cell" style="border-radius:6px"><div class="tok">sm</div><div class="val">6px</div></div>
  <div class="cell" style="border-radius:8px"><div class="tok">md</div><div class="val">8px</div></div>
  <div class="cell" style="border-radius:12px"><div class="tok">lg</div><div class="val">12px</div></div>
  <div class="cell" style="border-radius:16px"><div class="tok">xl</div><div class="val">16px</div></div>
  <div class="cell" style="border-radius:999px"><div class="tok">full</div><div class="val">999px</div></div>
</div>
</div></body></html>
