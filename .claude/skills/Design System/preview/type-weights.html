<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"><link rel="stylesheet" href="_card.css"><style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; font-family: Lato, sans-serif; }
  .cell { border-radius: 8px; background: #F9FAFB; padding: 16px; }
  .sample { font-size: 28px; line-height: 1.2; color: #12172B; letter-spacing: -0.3px; font-family: Lato, sans-serif; }
  .meta { font: 700 11px/1.2 "JetBrains Mono"; color: #6C727F; margin-top: 8px; }
</style></head><body><div class="card-root">
  <div class="grid">
    <div class="cell"><div class="sample" style="font-weight:400">Aa</div><div class="meta">Regular · 400</div></div>
    <div class="cell"><div class="sample" style="font-weight:700">Aa</div><div class="meta">Bold · 700</div></div>
    <div class="cell"><div class="sample" style="font-weight:900">Aa</div><div class="meta">Black · 900</div></div>
  </div>
  <div style="margin-top:12px;font:400 12px/16px Lato;color:#6C727F">Lato is the only UI typeface. Regular is the default body weight; Bold for buttons, labels and subheads; Black is reserved for page titles and hero numerics.</div>
</div></body></html>
