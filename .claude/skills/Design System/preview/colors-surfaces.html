<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  .stack { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 10px; }
  .sw { border-radius: 8px; height: 64px; border: 1px solid #EDEFF3; display: flex; align-items: flex-end; padding: 8px; font: 500 11px/1 "JetBrains Mono"; color: #12172B; }
  .name { font: 500 12px/1.2 Inter; margin-top: 6px; color: #12172B; }
  .hex { font: 400 11px/1 "JetBrains Mono"; color:#6C727F; }
  .col-5 { display:flex; flex-direction:column; }
</style></head><body><div class="card-root">
  <div class="stack">
    <div class="col-5"><div class="sw" style="background:#FCFCFD">&nbsp;</div><div class="name">background</div><div class="hex">#FCFCFD</div></div>
    <div class="col-5"><div class="sw" style="background:#FFFFFF">&nbsp;</div><div class="name">surface</div><div class="hex">#FFFFFF</div></div>
    <div class="col-5"><div class="sw" style="background:#F9FAFB">&nbsp;</div><div class="name">muted</div><div class="hex">#F9FAFB</div></div>
    <div class="col-5"><div class="sw" style="background:#F6F6F6">&nbsp;</div><div class="name">input fill</div><div class="hex">#F6F6F6</div></div>
    <div class="col-5"><div class="sw" style="background:#12172B;color:white">&nbsp;</div><div class="name">foreground</div><div class="hex">#12172B</div></div>
  </div>
</div></body></html>
