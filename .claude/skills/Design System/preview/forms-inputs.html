<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"><link rel="stylesheet" href="_card.css"><style>
  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .label { font:500 13px/20px Inter; color:#12172B; letter-spacing:-0.15px; }
  .input { height:38px; border-radius:8px; background:#F6F6F6; border:0; padding:0 12px; font:400 14px/1 Inter; color:#12172B; outline:0; width:100%; }
  .input::placeholder { color:#6C727F; }
  .input.focus { box-shadow: inset 0 0 0 2px #01187D; background:#FFFFFF; }
  .hint { font:400 12px/16px Inter; color:#6C727F; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
</style></head><body><div class="card-root">
  <div class="grid">
    <div class="field">
      <div class="label">Company Name</div>
      <input class="input" placeholder="Enter company name" />
      <div class="hint">Default — borderless, <span class="mono">#F6F6F6</span> fill</div>
    </div>
    <div class="field">
      <div class="label">Email Address</div>
      <input class="input focus" value="cfo@northfield.co" />
      <div class="hint">Focus — 2px inset ring in Royal Blue</div>
    </div>
  </div>
</div></body></html>
